spring:
  application:
    name: Taski.pro
  datasource:
    url: jdbc:postgresql://localhost:5432/taski_pro
    username: postgres
    password: 1234
    driverClassName: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
  mail:
    host: smtp.gmail.com
    username: 
    password: 
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
    port: 587
security:
    jwt:
      secret_key: 
      access_token_expiration: 36000000 # 10 hours
      refresh_token_expiration: 252000000 # 7 days
